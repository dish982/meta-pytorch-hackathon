spec_version: 1
name: kyc_env
type: space
runtime: fastapi
app: server.app:app 
port: 8000

tasks:
  - id: missing_data
    description: Handle missing fields using imputation
    difficulty: easy
    grader: grader.py:grade

  - id: format_check
    description: Normalize incorrect formatting
    difficulty: medium
    grader: grader.py:grade

  - id: compliance_audit
    description: Full KYC validation with all rules
    difficulty: hard
    grader: grader.py:grade