tasks:
  - id: missing_data
    description: Handle missing fields using imputation
    difficulty: easy
    grader: |
      def grade(log_lines):
        rewards = []
        for l in log_lines:
          if 'reward=' in l:
            try:
              val = float(l.split('reward=')[1].split(' ')[0])
              rewards.append(val)
            except:
              pass
        return max(0.01, min(0.99, sum(rewards)/len(rewards))) if rewards else 0.5

