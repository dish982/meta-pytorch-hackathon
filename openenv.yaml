spec_version: 1
name: kyc_env
type: space
runtime: fastapi
app: app:app
port: 8000

tasks:
  - id: missing_data
    description: Handle missing fields using imputation
    difficulty: easy
    grader: |
      def grade(log_lines):
        rewards = []
        for line in log_lines:
          if 'reward=' in line:
            try:
              reward = float(line.split('reward=')[1].split(' ')[0])
              rewards.append(reward)
            except:
              pass
        if not rewards:
          return 0.5
        score = sum(rewards) / len(rewards)
        return max(0.01, min(0.99, score))

