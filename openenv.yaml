spec_version: 1
name: kyc_env
type: space
runtime: fastapi
app: server.app:app 
port: 8000

tasks:
  - id: missing_data
    description: "Handle missing fields"
    difficulty: easy
    max_steps: 20
    grader: "mean_reward"  

  - id: format_check
    description: "Normalize formatting" 
    difficulty: medium
    max_steps: 20
    grader: "mean_reward"

  - id: compliance_audit
    description: "Full KYC validation"
    difficulty: hard
    max_steps: 20
    grader: "mean_reward"